<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Use Local Google Test Server</title>
  </head>
  <body>
    <h1>Use the local Google test server</h1>
    <p>
      Run <code>python docs/google_identity_test_server.py</code> from the repository root,
      then open <code>http://127.0.0.1:5500/test-google-login</code>.
    </p>
    <p>
      The server reads <code>GOOGLE_CLIENT_ID</code> from your environment or
      <code>backend/.env</code> and does not store the returned credential token.
    </p>
  </body>
</html>
