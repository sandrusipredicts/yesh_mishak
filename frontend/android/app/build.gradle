apply plugin: 'com.android.application'

// Single source of truth for Android release identity (E10-05).
// See docs/e10-05-android-version-strategy.md for the full bump procedure,
// versionCode/versionName rules, and edge cases. Do not duplicate these
// values elsewhere (CI, package.json, docs) -- everything else must read
// or reference this file instead.
def appVersionCode = 7
def appVersionName = "1.0.6"

if (!(appVersionCode instanceof Integer) || appVersionCode <= 0) {
    throw new GradleException("Invalid Android versionCode '${appVersionCode}': must be a positive integer. See docs/e10-05-android-version-strategy.md.")
}

if (!(appVersionName instanceof String) || !(appVersionName ==~ /^\d+\.\d+\.\d+$/)) {
    throw new GradleException("Invalid Android versionName '${appVersionName}': must follow MAJOR.MINOR.PATCH semantic versioning (e.g. 1.0.0). See docs/e10-05-android-version-strategy.md.")
}

def releaseSigningPropertiesFile = rootProject.file('key.properties')
def releaseSigningProperties = new Properties()
def releaseSigningRequiredProperties = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']
def releaseArtifactTaskPrefixes = ['assemble', 'bundle', 'package', 'install', 'publish']
def releaseSigningRequested = gradle.startParameter.taskNames.any { taskName ->
    def normalizedTaskName = taskName.tokenize(':').last()?.toLowerCase(Locale.ROOT)
    (normalizedTaskName in ['assemble', 'build', 'bundle']) ||
        (normalizedTaskName?.contains('release') && releaseArtifactTaskPrefixes.any { normalizedTaskName.startsWith(it) })
}

def missingReleaseSigningProperties = []

if (releaseSigningPropertiesFile.isFile()) {
    releaseSigningPropertiesFile.withInputStream { stream ->
        releaseSigningProperties.load(stream)
    }

    missingReleaseSigningProperties = releaseSigningRequiredProperties.findAll { propertyName ->
        !releaseSigningProperties.getProperty(propertyName)?.trim()
    }
}

def releaseSigningConfigured = releaseSigningPropertiesFile.isFile() && !missingReleaseSigningProperties

def releaseKeystoreFile = releaseSigningConfigured
    ? rootProject.file(releaseSigningProperties.getProperty('storeFile').trim())
    : null

def ciDebugSigningValues = [
    path: System.getenv('ANDROID_DEBUG_KEYSTORE_PATH'),
    storePassword: System.getenv('ANDROID_DEBUG_KEYSTORE_PASSWORD'),
    keyAlias: System.getenv('ANDROID_DEBUG_KEY_ALIAS'),
    keyPassword: System.getenv('ANDROID_DEBUG_KEY_PASSWORD'),
]
def ciDebugSigningRequested = ciDebugSigningValues.values().any { it }
def ciDebugSigningConfigured = ciDebugSigningValues.values().every { it }

if (ciDebugSigningRequested && !ciDebugSigningConfigured) {
    throw new GradleException('Incomplete CI debug signing configuration. Set the keystore path, store password, key alias, and key password together.')
}

if (ciDebugSigningConfigured && !rootProject.file(ciDebugSigningValues.path).isFile()) {
    throw new GradleException('Configured CI debug keystore file does not exist.')
}

android {
    namespace = "com.yeshmishak.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (releaseSigningConfigured) {
                storeFile releaseKeystoreFile
                storePassword releaseSigningProperties.getProperty('storePassword')
                keyAlias releaseSigningProperties.getProperty('keyAlias')
                keyPassword releaseSigningProperties.getProperty('keyPassword')
            }
        }
        if (ciDebugSigningConfigured) {
            ciDebug {
                storeFile rootProject.file(ciDebugSigningValues.path)
                storePassword ciDebugSigningValues.storePassword
                keyAlias ciDebugSigningValues.keyAlias
                keyPassword ciDebugSigningValues.keyPassword
            }
        }
    }
    defaultConfig {
        applicationId "com.yeshmishak.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            if (ciDebugSigningConfigured) {
                signingConfig signingConfigs.ciDebug
            }
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

if (missingReleaseSigningProperties) {
    throw new GradleException("Missing required release signing properties in key.properties: ${missingReleaseSigningProperties.join(', ')}")
}

if (releaseSigningConfigured && !releaseKeystoreFile.isFile()) {
    throw new GradleException('Configured release keystore file does not exist.')
}

if (releaseSigningRequested && !releaseSigningPropertiesFile.isFile()) {
    throw new GradleException('Release signing is not configured. Copy key.properties.example to key.properties and provide the external release keystore details.')
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

def googleServicesJson = file('google-services.json')
if (!googleServicesJson.exists() || googleServicesJson.length() == 0) {
    throw new GradleException("Missing Android Firebase config at ${googleServicesJson}. Place the Firebase google-services.json for com.yeshmishak.app at frontend/android/app/google-services.json before building Android.")
}

apply plugin: 'com.google.gms.google-services'

// Prints the resolved release identity for a build (E10-05). Useful for
// confirming, without a full assemble/bundle, which versionCode/versionName
// a Gradle invocation would produce -- e.g. `gradlew :app:printVersion`.
tasks.register('printVersion') {
    doLast {
        println "applicationId=${android.defaultConfig.applicationId}"
        println "versionCode=${appVersionCode}"
        println "versionName=${appVersionName}"
    }
}

// Outputs a strictly formatted JSON record for the Node orchestration flow (E10-09)
tasks.register('printSentryMetadata') {
    doLast {
        def appId = android.defaultConfig.applicationId
        if (!appId || !appVersionName || !appVersionCode) {
            throw new GradleException("Metadata fields are missing or empty.")
        }
        def json = """{
  "applicationId": "${appId}",
  "versionName": "${appVersionName}",
  "versionCode": ${appVersionCode},
  "release": "${appId}@${appVersionName}+${appVersionCode}",
  "dist": "${appVersionCode}"
}"""
        println "===SENTRY_METADATA_START==="
        println json
        println "===SENTRY_METADATA_END==="
    }
}

