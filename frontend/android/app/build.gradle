apply plugin: 'com.android.application'

def ciDebugSigningValues = [
    path: System.getenv('ANDROID_DEBUG_KEYSTORE_PATH'),
    storePassword: System.getenv('ANDROID_DEBUG_KEYSTORE_PASSWORD'),
    keyAlias: System.getenv('ANDROID_DEBUG_KEY_ALIAS'),
    keyPassword: System.getenv('ANDROID_DEBUG_KEY_PASSWORD'),
]
def ciDebugSigningRequested = ciDebugSigningValues.values().any { it }
def ciDebugSigningConfigured = ciDebugSigningValues.values().every { it }

if (ciDebugSigningRequested && !ciDebugSigningConfigured) {
    throw new GradleException('Incomplete CI debug signing configuration. Set the keystore path, store password, key alias, and key password together.')
}

if (ciDebugSigningConfigured && !rootProject.file(ciDebugSigningValues.path).isFile()) {
    throw new GradleException('Configured CI debug keystore file does not exist.')
}

android {
    namespace = "com.yeshmishak.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        if (ciDebugSigningConfigured) {
            ciDebug {
                storeFile rootProject.file(ciDebugSigningValues.path)
                storePassword ciDebugSigningValues.storePassword
                keyAlias ciDebugSigningValues.keyAlias
                keyPassword ciDebugSigningValues.keyPassword
            }
        }
    }
    defaultConfig {
        applicationId "com.yeshmishak.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            if (ciDebugSigningConfigured) {
                signingConfig signingConfigs.ciDebug
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

def googleServicesJson = file('google-services.json')
if (!googleServicesJson.exists() || googleServicesJson.length() == 0) {
    throw new GradleException("Missing Android Firebase config at ${googleServicesJson}. Place the Firebase google-services.json for com.yeshmishak.app at frontend/android/app/google-services.json before building Android.")
}

apply plugin: 'com.google.gms.google-services'
