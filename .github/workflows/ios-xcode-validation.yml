name: iOS Xcode Validation

# Validates that the Capacitor iOS project generated in frontend/ios/ is
# recognized by real macOS/Xcode tooling. This does NOT prove App Store,
# TestFlight, signing, or real-device readiness - see
# docs/ios-project-creation.md for exactly what this workflow does and does
# not validate.
#
# Note on -project vs -workspace: Capacitor 8 uses Swift Package Manager
# (frontend/ios/App/CapApp-SPM) instead of CocoaPods, so this project does
# not have a standalone frontend/ios/App/App.xcworkspace with a checked-in
# contents.xcworkspacedata (that file is only generated by CocoaPods'
# `pod install`, which this project does not use). The real, buildable
# artifact is frontend/ios/App/App.xcodeproj, which already has the
# CapApp-SPM local Swift package wired in directly via an
# XCLocalSwiftPackageReference in project.pbxproj. This workflow therefore
# validates against `-project App.xcodeproj`, not a nonexistent workspace
# path.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-xcode-validation.yml"
      - "frontend/ios/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/capacitor.config.ts"

jobs:
  ios-xcode-validation:
    name: Validate iOS project on macOS
    runs-on: macos-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Show Capacitor config
        run: npx cap config

      - name: Verify approved Bundle Identifier in committed configuration
        run: |
          grep -F "appId: 'com.yeshmishak.app'" capacitor.config.ts
          test "$(grep -c 'PRODUCT_BUNDLE_IDENTIFIER = com.yeshmishak.app;' ios/App/App.xcodeproj/project.pbxproj)" -eq 2

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Verify iOS Xcode project exists
        run: test -f ios/App/App.xcodeproj/project.pbxproj

      - name: Verify Xcode recognizes the project
        run: |
          cd ios/App
          xcodebuild -list -project App.xcodeproj

      - name: Verify Xcode resolves the approved Bundle Identifier
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings |
            grep -F "PRODUCT_BUNDLE_IDENTIFIER = com.yeshmishak.app"

      - name: Try unsigned iOS build
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
