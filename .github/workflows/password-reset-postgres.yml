name: Password reset PostgreSQL integration

on:
  pull_request:
    paths:
      - "backend/migrations/password_reset_tokens.sql"
      - "backend/tests/test_password_reset_postgres.py"
      - ".github/workflows/password-reset-postgres.yml"

permissions:
  contents: read

jobs:
  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: password_reset_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d password_reset_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PASSWORD_RESET_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/password_reset_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
      - name: Run PostgreSQL integration tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/test_password_reset_postgres.py -q
