name: Android Build Validation

on:
  pull_request:
    paths:
      - ".github/workflows/android-build-validation.yml"
      - "frontend/android/**"
      - "frontend/scripts/materialize-google-services.mjs"
      - "frontend/scripts/materialize-google-services.test.mjs"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/capacitor.config.ts"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  firebase-config-validation:
    name: Validate Firebase config pipeline without secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test Firebase config validation
        run: npm run test:android-google-services

  android-debug-build:
    name: Build Android debug APK with trusted Firebase config
    if: github.event_name == 'workflow_dispatch'
    needs: firebase-config-validation
    runs-on: ubuntu-latest
    env:
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
      ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
      ANDROID_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEYSTORE_PASSWORD }}
      ANDROID_DEBUG_KEY_ALIAS: ${{ secrets.ANDROID_DEBUG_KEY_ALIAS }}
      ANDROID_DEBUG_KEY_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEY_PASSWORD }}
      ANDROID_DEBUG_KEYSTORE_PATH: ci-debug.keystore
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
      # Sentry (E09-01): optional. A missing DSN disables reporting for this
      # branch-build APK (frontend/src/monitoring/config.js) without failing
      # the build -- Sentry is not required infrastructure for a debug
      # validation artifact. VITE_SENTRY_ENVIRONMENT/DIST are set explicitly
      # here (not left to runtime heuristics) so a branch-build APK can never
      # be misclassified as production in the dashboard.
      VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENVIRONMENT: branch-build
      # Source-map upload (vite.config.js) is likewise optional: a missing
      # SENTRY_AUTH_TOKEN makes the Sentry Vite plugin skip itself entirely,
      # so this build still succeeds with unsymbolicated maps.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_MOBILE_PROJECT: ${{ vars.SENTRY_MOBILE_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Validate required Android signing secrets
        run: |
          missing=0
          for name in \
            ANDROID_DEBUG_KEYSTORE_BASE64 \
            ANDROID_DEBUG_KEYSTORE_PASSWORD \
            ANDROID_DEBUG_KEY_ALIAS \
            ANDROID_DEBUG_KEY_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Required GitHub Actions secret ${name} is missing."
              missing=1
            fi
          done
          exit "$missing"

      - name: Materialize CI debug keystore
        run: |
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > android/ci-debug.keystore
          test -s android/ci-debug.keystore || {
            echo "::error::Decoded Android debug keystore is empty."
            exit 1
          }
          chmod 600 android/ci-debug.keystore

      - name: Materialize and validate Firebase Android config
        run: npm run android:google-services

      - name: Validate required Android Vite configuration
        run: |
          missing=0
          if [ -z "${VITE_API_URL:-}" ]; then
            echo "::error::Required GitHub Actions repository variable VITE_API_URL is missing."
            missing=1
          elif [[ "$VITE_API_URL" != https://* ]]; then
            echo "::error::VITE_API_URL must use HTTPS for the Android WebView."
            missing=1
          fi
          if [ -z "${VITE_GOOGLE_CLIENT_ID:-}" ]; then
            echo "::error::Required GitHub Actions repository variable VITE_GOOGLE_CLIENT_ID is missing."
            missing=1
          fi
          exit "$missing"

      - name: Resolve Sentry release identifier
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Interim deterministic format (docs/e09-01-crash-reporting-execution-plan.md):
          # Android versionName is still a static placeholder ("1.0", not yet
          # bumped per release), so only the commit SHA is reliably available
          # here. Once versionName reflects real releases this becomes
          # yesh-mishak@<versionName>+<sha>.
          echo "VITE_SENTRY_RELEASE=yesh-mishak@${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "VITE_SENTRY_DIST=android-branch-${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Validate optional Sentry configuration
        run: |
          if [ -z "${VITE_SENTRY_DSN:-}" ]; then
            echo "::warning::VITE_SENTRY_DSN repository variable is not set. This branch-build APK will run with crash reporting disabled (frontend/src/monitoring/config.js fails safe -- this does not fail the build)."
          fi

      - name: Build web assets for Android
        run: npm run build:android

      - name: Verify no secrets leaked into the built web bundle
        run: |
          if [ -n "${SENTRY_AUTH_TOKEN:-}" ] && grep -R -l -F -- "$SENTRY_AUTH_TOKEN" dist/ 2>/dev/null; then
            echo "::error::SENTRY_AUTH_TOKEN value found in the built web bundle. Failing to avoid shipping a secret."
            exit 1
          fi
          if grep -R -l "SENTRY_AUTH_TOKEN" dist/ 2>/dev/null; then
            echo "::error::Literal string SENTRY_AUTH_TOKEN found in the built web bundle."
            exit 1
          fi
          echo "No Sentry auth token material found in the built bundle."

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Ensure Gradle wrapper is executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Report debug APK certificate fingerprints
        working-directory: frontend/android
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          test -n "$APKSIGNER" || {
            echo "::error::Android apksigner was not found."
            exit 1
          }
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/debug/app-debug.apk \
            | grep -E 'certificate SHA-1 digest:|certificate SHA-256 digest:'

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Remove generated Android signing and Firebase files
        if: always()
        working-directory: frontend
        run: rm -f android/app/google-services.json android/ci-debug.keystore
